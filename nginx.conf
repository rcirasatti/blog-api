# Nginx configuration for Laravel Blog API with Octane/RoadRunner

upstream blog_api {
    server 127.0.0.1:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 80;
    server_name api.local;
    root /d/Semester8/Integrative\ Programming/blog-api/public;

    # Logs
    access_log /var/log/nginx/blog-api-access.log;
    error_log /var/log/nginx/blog-api-error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # CORS headers (adjust for your needs)
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    # Disable client body size limit for uploads (adjust as needed)
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml application/atom+xml image/svg+xml;

    # Static files - serve directly without hitting RoadRunner
    location ~* ^/(?:css|js|images|fonts|downloads)/(.*)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /robots.txt {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.ico {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Handle all other requests through RoadRunner
    location / {
        proxy_pass http://blog_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_redirect off;
        
        # Timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Deny access to .env and other sensitive files
    location ~ /\.(?!well-known).* {
        deny all;
        log_not_found off;
        access_log off;
    }

    location ~ /^\. {
        deny all;
    }

    # Deny access to storage/logs
    location ~ ^/(storage|bootstrap|config) {
        deny all;
    }
}

